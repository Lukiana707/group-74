<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>
<body>
<!-- 1) შექმენი HTML ფაილი, სადაც იქნება <div> ელემენტი, რომელშიც ჩაწერილი იქნება <h2>, <p>, და <span>. განსაზღვრე external CSS-ში, რომ color და font-family მემკვიდრეობით გადაეცეს <p> და <span> ელემენტებს. -->
<div>
    <h2>Lukiana</h2>
    <p>blababa</p>
    <span>5</span>
</div>
  
<!-- 2) შემოიტანეთ h1 თეგი, რომელსაც გადასცემ კლასს, აიდს, დამატებით კლასს, შემდეგ external css ში გამოიძახე ყველაფრით, აიდით, დამატებითი აიდით, კლასით და სელექთორით, და განსხვავებული ფერები გადაეცი ყოველი გამოძახებისას, თქვენი დავალებაა რომ საიტის გაშვებამდე დაწეროთ კომენტარის სახით თუ რა ფერი იქნება ტექსტი -->
<!--orange-->
<h1 id="hi1">helooo</h1>




<!-- 3) საიტზე შემოიტანე პარაგრაფი, ამ პარაგრაფში ჩანესტე underline, italic და bold ტექსტები, თქვენი დავალებაა რომ external css გამოყენებით ფერი შეუცვალოთ italic თეგს, გაიხსენეთ style inheritanceს წესი -->

<p class="name1">hello</p>
<u class="name2">hello_world</u><br>
<b class="name2">Lukiana</b><br>
<i class="name3">hi</i>


<!-- 4) კომენტარის სახით ახსენით თუ როგორ გამოვიძახოთ id და class -->

<!--we call an id with an # and a class with an .-->
</body>
</html>

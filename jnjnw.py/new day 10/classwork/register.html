<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register for GOA Academy</title>
</head>
<body>
  <header>
    <h1>Register Now</h1>
      <a href="index.html">Home</a> |
      <a href="about.html">About</a> |
      <a href="register.html">Register</a>
    
  </header>

  <form action="/submit" method="post">
    <label for="fname">First Name:</label>
    <input type="text" id="fname" name="first_name" required><br><br>

    <label for="lname">Last Name:</label>
    <input type="text" id="lname" name="last_name" required><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required><br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required><br><br>

    <label for="age">Age:</label>
    <input type="number" id="age" name="age" min="10" max="100" required><br><br>

    <label for="gender">Gender:</label>
    <select id="gender" name="gender" required>
      <option value="">Select</option>
      <option value="female">Female</option>
      <option value="male">Male</option>
      <option value="other">Other</option>
    </select><br><br>

    <button type="submit">Confirm Registration</button>
  </form>
</body>
</html>

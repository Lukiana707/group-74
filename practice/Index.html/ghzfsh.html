<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fruit Merge</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive;
      text-align: center;
      background: #fff8e1;
      margin: 0;
      padding: 20px;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    #timer {
      font-size: 1.2em;
      margin-bottom: 10px;
      color: #444;
    }

    #scoreboard {
      font-size: 1.2em;
      margin-bottom: 10px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    #startBtn, #restartBtn {
      padding: 10px 20px;
      font-size: 1.2em;
      background-color: #ffb703;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    #restartBtn {
      display: none;
      background-color: #e63946;
      color: white;
    }

    #gameBoard {
      display: grid;
      grid-template-columns: repeat(10, 50px);
      grid-gap: 6px;
      justify-content: center;
    }

    .cell {
      width: 50px;
      height: 50px;
      background-color: #fff;
      border: 2px solid #ccc;
      border-radius: 10px;
      font-size: 1.5em;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
    }

    .cell.selected {
      border-color: #ff5722;
      transform: scale(1.1);
    }

    .cell.merged {
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    @media (max-width: 600px) {
      #gameBoard {
        grid-template-columns: repeat(10, 35px);
        grid-gap: 5px;
      }

      .cell {
        width: 35px;
        height: 35px;
        font-size: 1.2em;
      }
    }
  </style>
</head>
<body>
  <h1>🍍 Fruit Merge</h1>
  <div id="timer">Time: <span id="time">0</span>s</div>
  <div id="scoreboard">
    <span>Score: <span id="score">0</span></span>
    <span>Best: <span id="bestScore">0</span></span>
  </div>
  <button id="startBtn">START GAME!</button>
  <button id="restartBtn">RESTART</button>
  <div id="gameBoard"></div>

  <audio id="mergeSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>

  <script>
    const board = document.getElementById("gameBoard");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const scoreDisplay = document.getElementById("score");
    const bestScoreDisplay = document.getElementById("bestScore");
    const mergeSound = document.getElementById("mergeSound");
    const timerDisplay = document.getElementById("time");

    let score = 0;
    let bestScore = localStorage.getItem("fruitBestScore") || 0;
    bestScoreDisplay.textContent = bestScore;

    const fruits = ["🍒", "🍋", "🍊", "🍎", "🍉", "🍍", "🥥", "🥭","🥝","🍈","🥭","🥑","🥥","🫒","🍅","🫛"];
    let gameInterval;
    let spawnInterval;
    let timeElapsed = 0;
    let gameOver = false;
    let isFirstRound = true;

    function createBoard() {
      board.innerHTML = "";
      for (let i = 0; i < 100; i++) {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.dataset.level = "0";
        cell.textContent = "";
        board.appendChild(cell);
      }
    }

    function spawnFruit() {
      if (gameOver) return;
      const emptyCells = [...document.querySelectorAll(".cell")].filter(cell => cell.textContent === "");
      if (emptyCells.length === 0) {
        endGame();
        return;
      }
      const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
      randomCell.dataset.level = "0";
      randomCell.textContent = fruits[0];
    }

    function mergeFruits(cell1, cell2) {
      let level = parseInt(cell1.dataset.level);
      if (level < fruits.length - 1) {
        level++;
        cell1.dataset.level = level;
        cell1.textContent = fruits[level];
        cell2.dataset.level = "0";
        cell2.textContent = "";
        score += level * 10;
        scoreDisplay.textContent = score;
        mergeSound.play();

        if (score > bestScore) {
          bestScore = score;
          bestScoreDisplay.textContent = bestScore;
          localStorage.setItem("fruitBestScore", bestScore);
        }

        cell1.classList.add("merged");
        setTimeout(() => cell1.classList.remove("merged"), 300);
      }
    }

    function setupInteractions() {
      const cells = document.querySelectorAll(".cell");
      cells.forEach(cell => {
        cell.addEventListener("click", () => {
          if (gameOver) return;
          const selected = document.querySelector(".selected");
          if (!selected) {
            if (cell.textContent !== "") {
              cell.classList.add("selected");
            }
          } else {
            if (selected !== cell && selected.textContent === cell.textContent) {
              mergeFruits(selected, cell);
              spawnFruit();
            }
            selected.classList.remove("selected");
          }
        });
      });
    }

    function startTimer() {
      clearInterval(gameInterval);
      clearInterval(spawnInterval);
      timeElapsed = 0;
      timerDisplay.textContent = timeElapsed;

      gameInterval = setInterval(() => {
        timeElapsed++;
        timerDisplay.textContent = timeElapsed;
      }, 1000);

      const spawnRate = isFirstRound ? 5000 : 10000;
      spawnInterval = setInterval(() => {
        spawnFruit();
        spawnFruit();
      }, spawnRate);

      setTimeout(() => { isFirstRound = false }, 5000);
    }

    function endGame() {
      gameOver = true;
      clearInterval(gameInterval);
      clearInterval(spawnInterval);
      restartBtn.style.display = "inline-block";
    }

    function startGame() {
      score = 0;
      scoreDisplay.textContent = score;
      gameOver = false;
      restartBtn.style.display = "none";
      isFirstRound = true;
      createBoard();
      spawnFruit();
      spawnFruit();
      setupInteractions();
      startTimer();
    }

    startBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", startGame);
  </script>
</body>
</html>

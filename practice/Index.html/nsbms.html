<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>my Banking</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f0f4f8;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #333;
    }

    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #0078D4;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #005ea2;
    }

    #bankApp {
      display: none;
      margin-top: 30px;
    }

    #balance {
      font-size: 24px;
      color: #28a745;
      margin: 20px 0;
    }

    ul {
      list-style-type: none;
      padding: 0;
    }

    li {
      background-color: #fff;
      margin: 5px auto;
      padding: 10px;
      width: 60%;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <h1>🏦 Welcome to my Banking</h1>
  <input id="username" placeholder="Enter your name">
  <button onclick="login()">Login</button>

  <div id="bankApp">
    <h2>Hello, <span id="userDisplay"></span>!</h2>
    <div id="balance">Balance: $1000000000000.00</div>

    <input type="number" id="amount" placeholder="Enter amount">
    <button onclick="deposit()">Deposit</button>
    <button onclick="withdraw()">Withdraw</button>

    <h3>Transaction History</h3>
    <ul id="history"></ul>
  </div>

  <script>
    let balance = 0;

    function login() {
      const name = document.getElementById('username').value.trim();
      if (!name) return alert("Please enter your name.");
      document.getElementById('userDisplay').textContent = name;
      document.getElementById('bankApp').style.display = 'block';
    }

    function deposit() {
      const amt = parseFloat(document.getElementById('amount').value);
      if (isNaN(amt) || amt <= 0) return alert("Enter a valid amount.");
      balance += amt;
      updateBalance();
      logTransaction(`Deposited $${amt.toFixed(2)}`);
    }

    function withdraw() {
      const amt = parseFloat(document.getElementById('amount').value);
      if (isNaN(amt) || amt <= 0) return alert("Enter a valid amount.");
      if (amt > balance) return alert("Insufficient funds.");
      balance -= amt;
      updateBalance();
      logTransaction(`Withdrew $${amt.toFixed(2)}`);
    }

    function updateBalance() {
      document.getElementById('balance').textContent = `Balance: $${balance.toFixed(2)}`;
    }

    function logTransaction(text) {
      const li = document.createElement('li');
      li.textContent = `${new Date().toLocaleTimeString()} - ${text}`;
      document.getElementById('history').prepend(li);
      document.getElementById('amount').value = '';
    }
  </script>
</body>
</html>

 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bunny Jump Obby</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #f0f8ff;
      font-family: 'Comic Sans MS', cursive;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to top, #a0e7e5, #f0f8ff);
    }

    .bunny {
      position: absolute;
      width: 40px;
      height: 40px;
      font-size: 32px;
      text-align: center;
      line-height: 40px;
      user-select: none;
    }

    .platform {
      position: absolute;
      background-color: #ffb6c1;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="bunny" class="bunny">🐰</div>
    <div class="platform" style="left: 100px; top: 400px; width: 200px; height: 20px;"></div>
    <div class="platform" style="left: 350px; top: 350px; width: 150px; height: 20px;"></div>
    <div class="platform" style="left: 550px; top: 300px; width: 100px; height: 20px;"></div>
    <div class="platform" style="left: 700px; top: 250px; width: 120px; height: 20px;"></div>
  </div>

  <script>
    const bunny = document.getElementById('bunny');
    const game = document.getElementById('game');
    const platforms = document.querySelectorAll('.platform');

    let x = 100;
    let y = 360;
    let vx = 0;
    let vy = 0;
    let gravity = 0.5;
    let jumpPower = -10;
    let onGround = false;

    function update() {
      vy += gravity;
      x += vx;
      y += vy;

      // Collision with ground
      if (y > window.innerHeight - 40) {
        y = window.innerHeight - 40;
        vy = 0;
        onGround = true;
      }

      // Collision with platforms
      onGround = false;
      platforms.forEach(p => {
        const px = p.offsetLeft;
        const py = p.offsetTop;
        const pw = p.offsetWidth;
        const ph = p.offsetHeight;

        if (
          x + 40 > px &&
          x < px + pw &&
          y + 40 > py &&
          y + 40 < py + ph + 10 &&
          vy >= 0
        ) {
          y = py - 40;
          vy = 0;
          onGround = true;
        }
      });

      bunny.style.left = x + 'px';
      bunny.style.top = y + 'px';

      requestAnimationFrame(update);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') vx = -5;
      if (e.key === 'ArrowRight') vx = 5;
      if (e.key === ' ' && onGround) vy = jumpPower;
    });

    document.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') vx = 0;
    });

    update();
  </script>
</body>
</html>

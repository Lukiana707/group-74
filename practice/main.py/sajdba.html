



<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Notepad</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    h1 {
      color: #333;
    }

    textarea {
      width: 80%;
      height: 300px;
      padding: 15px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      resize: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #0078D4;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #005ea2;
    }

    #status {
      margin-top: 10px;
      color: #0078D4;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>My Notepad 📝</h1>
  <textarea id="noteArea" placeholder="Start typing your notes here..."></textarea>
  <button onclick="clearNotes()">Clear Notes</button>
  <div id="status"></div>

  <script>
    function clearNotes() {
      const noteArea = document.getElementById('noteArea');
      noteArea.value = '';
      document.getElementById('status').textContent = 'Notes cleared!';
    }
  </script>
</body>
</html>
